<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBridge — Select a Classroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    :root {
      /* --- Colors: Primary (Indigo) --- */
      --color-primary: #4F46E5;
      --color-primary-hover: #4338CA;
      --color-primary-active: #3730A3;
      --color-primary-disabled: #A5B4FC;
      --color-primary-light: #EEF2FF;

      /* --- Colors: Secondary (Teal) --- */
      --color-secondary: #0D9488;
      --color-secondary-hover: #0F766E;
      --color-secondary-active: #115E59;
      --color-secondary-disabled: #99F6E4;
      --color-secondary-light: #F0FDFA;

      /* --- Colors: Accent (Amber) --- */
      --color-accent: #F59E0B;
      --color-accent-hover: #D97706;
      --color-accent-active: #B45309;

      /* --- Colors: Semantic --- */
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;
      --color-info: #3B82F6;

      /* --- Colors: Neutral Scale (9 steps) --- */
      --neutral-0: #FFFFFF;
      --neutral-50: #F9FAFB;
      --neutral-100: #F3F4F6;
      --neutral-200: #E5E7EB;
      --neutral-300: #D1D5DB;
      --neutral-400: #9CA3AF;
      --neutral-500: #6B7280;
      --neutral-600: #374151;
      --neutral-900: #111827;

      /* --- Colors: Background Tiers --- */
      --bg-page: #F9FAFB;
      --bg-surface: #FFFFFF;
      --bg-elevated: #FFFFFF; /* with shadow */

      /* --- Chat Bubble Colors --- */
      --bubble-student: #4F46E5;
      --bubble-student-text: #FFFFFF;
      --bubble-ai: #F3F4F6;
      --bubble-ai-text: #111827;
      --bubble-system: #E5E7EB;
      --bubble-system-text: #6B7280;

      /* --- Typography --- */
      --font-heading: 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --text-xs: 0.75rem;   /* 12px */
      --text-sm: 0.875rem;  /* 14px */
      --text-base: 1rem;    /* 16px */
      --text-lg: 1.125rem;  /* 18px */
      --text-xl: 1.25rem;   /* 20px */
      --text-2xl: 1.5rem;   /* 24px */
      --text-3xl: 1.875rem; /* 30px */

      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;
      --weight-bold: 700;

      --leading-tight: 1.25;
      --leading-normal: 1.5;
      --leading-relaxed: 1.75;

      /* --- Spacing --- */
      --space-unit: 4px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;

      /* --- Elevation --- */
      --shadow-flat: none;
      --shadow-raised: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-floating: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-overlay: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.05);

      /* --- Border Radius --- */
      --radius-none: 0;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;

      /* --- Motion --- */
      --ease-micro: cubic-bezier(0, 0, 0.2, 1);
      --ease-panel: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

      --duration-micro: 200ms;
      --duration-panel: 300ms;
      --duration-page: 400ms;
      --duration-app-materialize: 500ms;
      --duration-shimmer: 1.5s;
    }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-page);
  color: var(--neutral-900);
  line-height: 1.5;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* Minimal topbar */
.topbar {
  display: flex; align-items: center; justify-content: center;
  height: 56px; padding: 0 var(--space-lg);
  background: var(--bg-surface); border-bottom: 1px solid var(--neutral-200);
}
.logo {
  font-size: 18px; font-weight: 700; color: var(--color-primary);
  text-decoration: none; display: flex; align-items: center; gap: var(--space-sm);
}
.logo svg { width: 24px; height: 24px; }

/* Centered content */
.page-center {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: var(--space-xl);
}

.selector-card {
  width: 100%; max-width: 560px;
}

/* Welcome header */
.welcome-header {
  text-align: center; margin-bottom: var(--space-xl);
}
.welcome-avatar {
  width: 64px; height: 64px; border-radius: var(--radius-full);
  background: #6366F1; color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700;
  margin: 0 auto var(--space-md);
}
.welcome-header h1 { font-size: 22px; font-weight: 700; }

.section-label {
  font-size: 13px; font-weight: 600; color: var(--neutral-500);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: var(--space-md);
}

/* Classroom cards */
.classroom-list { display: flex; flex-direction: column; gap: var(--space-md); }

.classroom-card {
  display: flex; align-items: center; gap: var(--space-lg);
  padding: var(--space-lg);
  background: var(--bg-surface);
  border: 1px solid var(--neutral-200);
  border-radius: var(--radius-lg);
  cursor: pointer; text-decoration: none; color: inherit;
  transition: box-shadow 0.15s, border-color 0.15s;
}
.classroom-card:hover {
  box-shadow: var(--shadow-floating); border-color: var(--color-primary);
}

.classroom-icon {
  width: 48px; height: 48px; border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}

.classroom-info { flex: 1; min-width: 0; }
.classroom-name { font-size: 15px; font-weight: 600; }
.classroom-meta {
  font-size: 13px; color: var(--neutral-500); margin-top: 2px;
}

.classroom-arrow {
  color: var(--neutral-400); flex-shrink: 0;
}

.last-active {
  display: inline-flex; align-items: center; gap: 4px;
}
.active-dot {
  width: 6px; height: 6px; border-radius: var(--radius-full);
  display: inline-block;
}
.active-dot.today { background: var(--color-success); }
.active-dot.yesterday { background: var(--neutral-400); }

/* Join link */
.join-link {
  text-align: center; margin-top: var(--space-xl);
}
.join-link a {
  font-size: 14px; color: var(--color-primary); text-decoration: none; font-weight: 500;
}
.join-link a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header class="topbar">
  <a href="#" class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    ChatBridge
  </a>
</header>

<div class="page-center">
  <div class="selector-card">

    <div class="welcome-header">
      <div class="welcome-avatar">AK</div>
      <h1>Welcome back, Aisha!</h1>
    </div>

    <div class="section-label">Your Classrooms</div>

    <div class="classroom-list">

      <a href="student-chat.html" class="classroom-card">
        <div class="classroom-icon" style="background: #EEF2FF;">&#128290;</div>
        <div class="classroom-info">
          <div class="classroom-name">Period 2 -- Math</div>
          <div class="classroom-meta">
            Ms. Johnson &middot; 28 students &middot;
            <span class="last-active"><span class="active-dot today"></span> Last active: today</span>
          </div>
        </div>
        <div class="classroom-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>

      <a href="student-chat.html" class="classroom-card">
        <div class="classroom-icon" style="background: #CCFBF1;">&#128300;</div>
        <div class="classroom-info">
          <div class="classroom-name">Period 3 -- Science</div>
          <div class="classroom-meta">
            Mr. Rodriguez &middot; 24 students &middot;
            <span class="last-active"><span class="active-dot today"></span> Last active: today</span>
          </div>
        </div>
        <div class="classroom-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>

      <a href="student-chat.html" class="classroom-card">
        <div class="classroom-icon" style="background: #FEF3C7;">&#128214;</div>
        <div class="classroom-info">
          <div class="classroom-name">Period 5 -- English</div>
          <div class="classroom-meta">
            Dr. Chen &middot; 30 students &middot;
            <span class="last-active"><span class="active-dot yesterday"></span> Last active: yesterday</span>
          </div>
        </div>
        <div class="classroom-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </a>

    </div>

    <div class="join-link">
      <a href="#">Join a new classroom</a>
    </div>

  </div>
</div>

</body>
</html>
