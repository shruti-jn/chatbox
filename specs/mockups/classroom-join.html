<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBridge — Join a Classroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    :root {
      /* --- Colors: Primary (Indigo) --- */
      --color-primary: #4F46E5;
      --color-primary-hover: #4338CA;
      --color-primary-active: #3730A3;
      --color-primary-disabled: #A5B4FC;
      --color-primary-light: #EEF2FF;

      /* --- Colors: Secondary (Teal) --- */
      --color-secondary: #0D9488;
      --color-secondary-hover: #0F766E;
      --color-secondary-active: #115E59;
      --color-secondary-disabled: #99F6E4;
      --color-secondary-light: #F0FDFA;

      /* --- Colors: Accent (Amber) --- */
      --color-accent: #F59E0B;
      --color-accent-hover: #D97706;
      --color-accent-active: #B45309;

      /* --- Colors: Semantic --- */
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;
      --color-info: #3B82F6;

      /* --- Colors: Neutral Scale (9 steps) --- */
      --neutral-0: #FFFFFF;
      --neutral-50: #F9FAFB;
      --neutral-100: #F3F4F6;
      --neutral-200: #E5E7EB;
      --neutral-300: #D1D5DB;
      --neutral-400: #9CA3AF;
      --neutral-500: #6B7280;
      --neutral-600: #374151;
      --neutral-900: #111827;

      /* --- Colors: Background Tiers --- */
      --bg-page: #F9FAFB;
      --bg-surface: #FFFFFF;
      --bg-elevated: #FFFFFF; /* with shadow */

      /* --- Chat Bubble Colors --- */
      --bubble-student: #4F46E5;
      --bubble-student-text: #FFFFFF;
      --bubble-ai: #F3F4F6;
      --bubble-ai-text: #111827;
      --bubble-system: #E5E7EB;
      --bubble-system-text: #6B7280;

      /* --- Typography --- */
      --font-heading: 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --text-xs: 0.75rem;   /* 12px */
      --text-sm: 0.875rem;  /* 14px */
      --text-base: 1rem;    /* 16px */
      --text-lg: 1.125rem;  /* 18px */
      --text-xl: 1.25rem;   /* 20px */
      --text-2xl: 1.5rem;   /* 24px */
      --text-3xl: 1.875rem; /* 30px */

      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;
      --weight-bold: 700;

      --leading-tight: 1.25;
      --leading-normal: 1.5;
      --leading-relaxed: 1.75;

      /* --- Spacing --- */
      --space-unit: 4px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;

      /* --- Elevation --- */
      --shadow-flat: none;
      --shadow-raised: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-floating: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-overlay: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.05);

      /* --- Border Radius --- */
      --radius-none: 0;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;

      /* --- Motion --- */
      --ease-micro: cubic-bezier(0, 0, 0.2, 1);
      --ease-panel: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

      --duration-micro: 200ms;
      --duration-panel: 300ms;
      --duration-page: 400ms;
      --duration-app-materialize: 500ms;
      --duration-shimmer: 1.5s;
    }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  color: var(--neutral-900);
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, #EEF2FF 0%, #F9FAFB 40%, #FFFFFF 100%);
}

.join-card {
  width: 100%;
  max-width: 420px;
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-overlay);
  padding: 40px var(--space-xl);
  text-align: center;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
}

.logo svg { width: 40px; height: 40px; }

.logo-text {
  font-size: 28px;
  font-weight: 700;
  color: var(--color-primary);
}

.join-heading {
  font-size: 20px;
  font-weight: 600;
  color: var(--neutral-900);
  margin-bottom: var(--space-xl);
}

/* Code Input */
.code-input-wrapper {
  margin-bottom: var(--space-sm);
}

.code-input {
  width: 100%;
  padding: 16px;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  border: 2px solid var(--neutral-200);
  border-radius: var(--radius-md);
  color: var(--neutral-900);
  background: var(--bg-page);
  outline: none;
}

.code-input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.code-input::placeholder {
  color: var(--neutral-400);
  letter-spacing: 0.3em;
}

.code-input.error {
  border-color: var(--color-error);
  box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
}

.code-hint {
  font-size: 13px;
  color: var(--neutral-400);
  margin-bottom: var(--space-lg);
}

.error-message {
  font-size: 13px;
  color: var(--color-error);
  margin-bottom: var(--space-md);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.join-btn {
  width: 100%;
  padding: 14px;
  background: var(--color-primary);
  color: white;
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-bottom: var(--space-lg);
}
.join-btn:hover { background: var(--color-primary-hover); }

.existing-link {
  font-size: 13px;
  color: var(--neutral-500);
}

.existing-link a {
  color: var(--color-primary);
  text-decoration: none;
  font-weight: 500;
}
.existing-link a:hover { text-decoration: underline; }

/* Compliance Footer */
.compliance {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-sm);
  font-size: 12px;
  color: var(--neutral-400);
  padding-top: var(--space-md);
  margin-top: var(--space-lg);
  border-top: 1px solid var(--neutral-200);
}

.compliance svg { width: 16px; height: 16px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="join-card">
  <!-- Logo -->
  <div class="logo">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="8" width="15" height="14" rx="4" fill="#4F46E5"/>
      <rect x="22" y="8" width="15" height="14" rx="4" fill="#4F46E5" opacity="0.6"/>
      <path d="M18 15 L22 15" stroke="#4F46E5" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M8 24 L8 30 L14 27" fill="#4F46E5" opacity="0.4"/>
      <circle cx="9" cy="14" r="1.5" fill="white"/>
      <circle cx="14" cy="14" r="1.5" fill="white"/>
      <circle cx="28" cy="14" r="1.5" fill="white" opacity="0.8"/>
      <circle cx="33" cy="14" r="1.5" fill="white" opacity="0.8"/>
    </svg>
    <span class="logo-text">ChatBridge</span>
  </div>

  <h1 class="join-heading">Join a Classroom</h1>

  <div class="code-input-wrapper">
    <input class="code-input error" type="text" maxlength="6" placeholder="AB3X7Q" value="XZ9QWP">
  </div>

  <div class="error-message">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    That code doesn't match any classroom. Check with your teacher and try again.
  </div>

  <p class="code-hint">Ask your teacher for the classroom code</p>

  <button class="join-btn">Join</button>

  <p class="existing-link">Already in a classroom? <a href="student-chat--empty.html">Go to your conversations</a></p>

  <!-- Compliance -->
  <div class="compliance">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 1L2 4v4c0 3.5 2.5 6.4 6 7 3.5-.6 6-3.5 6-7V4L8 1z" fill="#9CA3AF" opacity="0.3"/>
      <path d="M8 1L2 4v4c0 3.5 2.5 6.4 6 7 3.5-.6 6-3.5 6-7V4L8 1z" stroke="#9CA3AF" stroke-width="1.2" fill="none"/>
      <path d="M5.5 8L7 9.5L10.5 6" stroke="#9CA3AF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    COPPA &amp; FERPA Compliant
  </div>
</div>

</body>
</html>
