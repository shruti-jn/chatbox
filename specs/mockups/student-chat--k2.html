<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBridge — Student Chat (K-2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    :root {
      /* --- Colors: Primary (Indigo) --- */
      --color-primary: #4F46E5;
      --color-primary-hover: #4338CA;
      --color-primary-active: #3730A3;
      --color-primary-disabled: #A5B4FC;
      --color-primary-light: #EEF2FF;

      /* --- Colors: Secondary (Teal) --- */
      --color-secondary: #0D9488;
      --color-secondary-hover: #0F766E;
      --color-secondary-active: #115E59;
      --color-secondary-disabled: #99F6E4;
      --color-secondary-light: #F0FDFA;

      /* --- Colors: Accent (Amber) --- */
      --color-accent: #F59E0B;
      --color-accent-hover: #D97706;
      --color-accent-active: #B45309;

      /* --- Colors: Semantic --- */
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;
      --color-info: #3B82F6;

      /* --- Colors: Neutral Scale (9 steps) --- */
      --neutral-0: #FFFFFF;
      --neutral-50: #F9FAFB;
      --neutral-100: #F3F4F6;
      --neutral-200: #E5E7EB;
      --neutral-300: #D1D5DB;
      --neutral-400: #9CA3AF;
      --neutral-500: #6B7280;
      --neutral-600: #374151;
      --neutral-900: #111827;

      /* --- Colors: Background Tiers --- */
      --bg-page: #F9FAFB;
      --bg-surface: #FFFFFF;
      --bg-elevated: #FFFFFF; /* with shadow */

      /* --- Chat Bubble Colors --- */
      --bubble-student: #4F46E5;
      --bubble-student-text: #FFFFFF;
      --bubble-ai: #F3F4F6;
      --bubble-ai-text: #111827;
      --bubble-system: #E5E7EB;
      --bubble-system-text: #6B7280;

      /* --- Typography --- */
      --font-heading: 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --text-xs: 0.75rem;   /* 12px */
      --text-sm: 0.875rem;  /* 14px */
      --text-base: 1rem;    /* 16px */
      --text-lg: 1.125rem;  /* 18px */
      --text-xl: 1.25rem;   /* 20px */
      --text-2xl: 1.5rem;   /* 24px */
      --text-3xl: 1.875rem; /* 30px */

      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;
      --weight-bold: 700;

      --leading-tight: 1.25;
      --leading-normal: 1.5;
      --leading-relaxed: 1.75;

      /* --- Spacing --- */
      --space-unit: 4px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;

      /* --- Elevation --- */
      --shadow-flat: none;
      --shadow-raised: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-floating: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-overlay: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.05);

      /* --- Border Radius --- */
      --radius-none: 0;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;

      /* --- Motion --- */
      --ease-micro: cubic-bezier(0, 0, 0.2, 1);
      --ease-panel: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

      --duration-micro: 200ms;
      --duration-panel: 300ms;
      --duration-page: 400ms;
      --duration-app-materialize: 500ms;
      --duration-shimmer: 1.5s;
    }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-page);
  color: var(--neutral-900);
  line-height: 1.5;
  height: 100vh; overflow: hidden;
  /* K-2: larger base font */
  font-size: 22px;
}

/* Top Bar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  height: 64px; padding: 0 var(--space-lg);
  background: var(--bg-surface); border-bottom: 1px solid var(--neutral-200);
}
.topbar-left { display: flex; align-items: center; gap: var(--space-md); }
.logo {
  font-size: 22px; font-weight: 700; color: var(--color-primary);
  text-decoration: none; display: flex; align-items: center; gap: var(--space-sm);
}
.logo svg { width: 28px; height: 28px; }
.grade-badge {
  font-size: 14px; font-weight: 600; color: white;
  background: var(--color-primary); padding: 6px 16px;
  border-radius: var(--radius-full);
}
.topbar-right { display: flex; align-items: center; gap: var(--space-md); }
.user-avatar {
  width: 40px; height: 40px; border-radius: var(--radius-full);
  background: #F472B6; color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600;
}

/* Layout */
.app-layout { display: flex; height: calc(100vh - 64px); }

/* Sidebar -- simplified for K-2 */
.sidebar {
  width: 200px; min-width: 200px;
  background: var(--bg-surface); border-right: 1px solid var(--neutral-200);
  padding: var(--space-md); display: flex; flex-direction: column; gap: var(--space-sm);
}
.sidebar-item {
  display: flex; align-items: center; gap: var(--space-sm);
  padding: 12px var(--space-md);
  border-radius: var(--radius-lg);
  font-size: 16px; font-weight: 500;
  cursor: pointer; text-decoration: none; color: inherit;
}
.sidebar-item:hover { background: var(--bg-page); }
.sidebar-item.active { background: #EEF2FF; border: 1px solid #C7D2FE; }
.sidebar-emoji { font-size: 22px; }

/* Chat */
.chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-messages { flex: 1; overflow-y: auto; padding: var(--space-lg) var(--space-2xl); }

.message {
  display: flex; gap: var(--space-md); margin-bottom: var(--space-xl);
  max-width: 700px; margin-left: auto; margin-right: auto;
}
.message.student { flex-direction: row-reverse; }
.message-avatar {
  width: 44px; height: 44px; border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; flex-shrink: 0;
}
.message.ai .message-avatar {
  background: linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color: white;
  font-size: 20px;
}
.message.student .message-avatar { background: #FECDD3; color: #9F1239; }
.message-content { max-width: 540px; }
.message.student .message-content { text-align: right; }
.message-bubble {
  display: inline-block; padding: 16px 20px;
  border-radius: 20px; font-size: 22px; line-height: 1.5; text-align: left;
}
.message.ai .message-bubble { background: var(--bg-page); border: 1px solid var(--neutral-200); }
.message.student .message-bubble { background: var(--color-primary); color: white; }

.ai-label {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--neutral-400); margin-top: 6px;
}

/* Suggestion Chips -- PRIMARY input for K-2 */
.suggestion-chips {
  max-width: 700px; margin: 0 auto var(--space-md);
  display: flex; flex-wrap: wrap; gap: var(--space-md);
  justify-content: center;
  padding: 0 var(--space-2xl);
}
.chip {
  display: inline-flex; align-items: center; gap: var(--space-sm);
  padding: 16px 28px;
  border-radius: var(--radius-full);
  background: var(--bg-surface);
  border: 2px solid var(--neutral-200);
  font-size: 20px; font-weight: 600;
  cursor: pointer; min-height: 56px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.chip:hover {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
}
.chip:active { background: #EEF2FF; }
.chip-emoji { font-size: 26px; }

/* Text input -- secondary for K-2 */
.chat-input-bar {
  padding: var(--space-sm) var(--space-2xl) var(--space-md);
  background: var(--bg-surface); border-top: 1px solid var(--neutral-200);
}
.chat-input-row {
  display: flex; align-items: center; gap: var(--space-sm);
  max-width: 700px; margin: 0 auto;
  background: var(--bg-page); border: 1px solid var(--neutral-200);
  border-radius: var(--radius-lg); padding: 4px;
}
.chat-input {
  flex: 1; border: none; background: transparent;
  font-family: var(--font-body); font-size: 16px;
  padding: 8px; outline: none; color: var(--neutral-900);
}
.chat-input::placeholder { color: var(--neutral-400); }
.send-btn {
  width: 48px; height: 48px; border: none; border-radius: var(--radius-md);
  background: var(--color-primary); color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <a href="#" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      ChatBridge
    </a>
    <span class="grade-badge">K-2</span>
  </div>
  <div class="topbar-right">
    <div class="user-avatar">LM</div>
  </div>
</header>

<div class="app-layout">

  <!-- Simplified sidebar -->
  <aside class="sidebar">
    <a href="#" class="sidebar-item active">
      <span class="sidebar-emoji">&#128172;</span> My Class
    </a>
    <a href="#" class="sidebar-item">
      <span class="sidebar-emoji">&#11088;</span> Fun Stuff
    </a>
  </aside>

  <main class="chat-main">
    <div class="chat-messages">

      <!-- AI greeting -->
      <div class="message ai">
        <div class="message-avatar">&#129302;</div>
        <div class="message-content">
          <div class="message-bubble">
            Hi Lily! What do you want to do today?
          </div>
          <div class="ai-label">&#129302; ChatBridge</div>
        </div>
      </div>

      <!-- Student message -->
      <div class="message student">
        <div class="message-avatar">LM</div>
        <div class="message-content">
          <div class="message-bubble">I want to play!</div>
        </div>
      </div>

      <!-- AI response -->
      <div class="message ai">
        <div class="message-avatar">&#129302;</div>
        <div class="message-content">
          <div class="message-bubble">
            Let's play a game! Pick one:
          </div>
          <div class="ai-label">&#129302; ChatBridge</div>
        </div>
      </div>

    </div>

    <!-- Suggestion Chips (PRIMARY input for K-2) -->
    <div class="suggestion-chips">
      <button class="chip">
        <span class="chip-emoji">&#9823;</span> Play Chess
      </button>
      <button class="chip">
        <span class="chip-emoji">&#128218;</span> Flash Cards
      </button>
      <button class="chip">
        <span class="chip-emoji">&#128214;</span> Tell me a Story
      </button>
    </div>

    <!-- Text input (secondary) -->
    <div class="chat-input-bar">
      <div class="chat-input-row">
        <input class="chat-input" type="text" placeholder="Or type something...">
        <button class="send-btn" title="Send">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>

</div>

</body>
</html>
