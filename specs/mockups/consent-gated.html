<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBridge — Waiting for Permission</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    :root {
      /* --- Colors: Primary (Indigo) --- */
      --color-primary: #4F46E5;
      --color-primary-hover: #4338CA;
      --color-primary-active: #3730A3;
      --color-primary-disabled: #A5B4FC;
      --color-primary-light: #EEF2FF;

      /* --- Colors: Secondary (Teal) --- */
      --color-secondary: #0D9488;
      --color-secondary-hover: #0F766E;
      --color-secondary-active: #115E59;
      --color-secondary-disabled: #99F6E4;
      --color-secondary-light: #F0FDFA;

      /* --- Colors: Accent (Amber) --- */
      --color-accent: #F59E0B;
      --color-accent-hover: #D97706;
      --color-accent-active: #B45309;

      /* --- Colors: Semantic --- */
      --color-success: #10B981;
      --color-warning: #F59E0B;
      --color-error: #EF4444;
      --color-info: #3B82F6;

      /* --- Colors: Neutral Scale (9 steps) --- */
      --neutral-0: #FFFFFF;
      --neutral-50: #F9FAFB;
      --neutral-100: #F3F4F6;
      --neutral-200: #E5E7EB;
      --neutral-300: #D1D5DB;
      --neutral-400: #9CA3AF;
      --neutral-500: #6B7280;
      --neutral-600: #374151;
      --neutral-900: #111827;

      /* --- Colors: Background Tiers --- */
      --bg-page: #F9FAFB;
      --bg-surface: #FFFFFF;
      --bg-elevated: #FFFFFF; /* with shadow */

      /* --- Chat Bubble Colors --- */
      --bubble-student: #4F46E5;
      --bubble-student-text: #FFFFFF;
      --bubble-ai: #F3F4F6;
      --bubble-ai-text: #111827;
      --bubble-system: #E5E7EB;
      --bubble-system-text: #6B7280;

      /* --- Typography --- */
      --font-heading: 'Inter', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --text-xs: 0.75rem;   /* 12px */
      --text-sm: 0.875rem;  /* 14px */
      --text-base: 1rem;    /* 16px */
      --text-lg: 1.125rem;  /* 18px */
      --text-xl: 1.25rem;   /* 20px */
      --text-2xl: 1.5rem;   /* 24px */
      --text-3xl: 1.875rem; /* 30px */

      --weight-regular: 400;
      --weight-medium: 500;
      --weight-semibold: 600;
      --weight-bold: 700;

      --leading-tight: 1.25;
      --leading-normal: 1.5;
      --leading-relaxed: 1.75;

      /* --- Spacing --- */
      --space-unit: 4px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --space-3xl: 64px;

      /* --- Elevation --- */
      --shadow-flat: none;
      --shadow-raised: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-floating: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-overlay: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.05);

      /* --- Border Radius --- */
      --radius-none: 0;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;

      /* --- Motion --- */
      --ease-micro: cubic-bezier(0, 0, 0.2, 1);
      --ease-panel: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

      --duration-micro: 200ms;
      --duration-panel: 300ms;
      --duration-page: 400ms;
      --duration-app-materialize: 500ms;
      --duration-shimmer: 1.5s;
    }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-page);
  color: var(--neutral-900);
  line-height: 1.5;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

.consent-card {
  max-width: 480px; width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--neutral-200);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-overlay);
  padding: var(--space-2xl) var(--space-xl);
  text-align: center;
}

.logo {
  font-size: 20px; font-weight: 700; color: var(--color-primary);
  display: flex; align-items: center; justify-content: center; gap: var(--space-sm);
  margin-bottom: var(--space-xl);
}
.logo svg { width: 28px; height: 28px; }

/* Shield illustration */
.illustration {
  width: 80px; height: 80px; margin: 0 auto var(--space-lg);
  background: #EEF2FF;
  border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
}
.shield-icon {
  width: 40px; height: 40px; color: var(--color-primary);
}

.consent-title {
  font-size: 20px; font-weight: 700; color: var(--neutral-900);
  margin-bottom: var(--space-md);
}

.consent-message {
  font-size: 15px; color: var(--neutral-500);
  margin-bottom: var(--space-md); line-height: 1.6;
}

.consent-detail {
  font-size: 14px; color: var(--neutral-400);
  margin-bottom: var(--space-xl); line-height: 1.6;
}

.refresh-btn {
  padding: 12px 28px;
  background: var(--color-primary); color: white; border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-body); font-size: 14px; font-weight: 600;
  cursor: pointer;
}
.refresh-btn:hover { background: var(--color-primary-hover); }

.already-text {
  font-size: 13px; color: var(--neutral-400);
  margin-top: var(--space-md);
}
</style>
</head>
<body>

<div class="consent-card">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    ChatBridge
  </div>

  <div class="illustration">
    <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      <polyline points="9 12 11 14 15 10"/>
    </svg>
  </div>

  <h1 class="consent-title">Almost there!</h1>

  <p class="consent-message">
    Your parent needs to give permission before you can use ChatBridge.
  </p>

  <p class="consent-detail">
    Your teacher sent a permission form to your parent. Once they approve, you'll be able to start chatting!
  </p>

  <button class="refresh-btn">Refresh</button>

  <p class="already-text">Already approved? Click Refresh to check.</p>
</div>

</body>
</html>
