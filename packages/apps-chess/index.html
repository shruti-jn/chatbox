<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBridge Chess</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #F9FAFB;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      min-height: 100%;
    }
    .cb-app-card {
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      background: #FFFFFF;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .cb-app-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #E2E8F0;
      font-family: 'Inter', 'Roboto', sans-serif;
      font-size: 14px;
      color: #374151;
    }
    .cb-app-icon { font-size: 20px; }
    .cb-app-name { font-weight: 600; }
    .cb-app-status { margin-left: auto; color: #6B7280; font-size: 12px; }
    .cb-app-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .board-container {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: 100%;
      height: 100%;
      border: 2px solid #334155;
      border-radius: 8px;
      overflow: hidden;
    }
    .square {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(5vw, 40px);
      cursor: pointer;
      user-select: none;
      transition: background-color 0.15s;
    }
    .square.light { background: #F1F5F9; }
    .square.dark { background: #94A3B8; }
    .square.selected { background: #818CF8 !important; }
    .square.valid-move { background: #A5F3FC !important; }
    .square.valid-move::after {
      content: '';
      width: 30%;
      height: 30%;
      border-radius: 50%;
      background: rgba(79, 70, 229, 0.4);
      position: absolute;
    }
    .square.last-move { background: #FDE68A !important; }
    .piece { cursor: grab; }
    .piece:active { cursor: grabbing; }

    .status-bar {
      width: 100%;
      max-width: 480px;
      padding: 12px 16px;
      margin-top: 12px;
      background: #F9FAFB;
      border-radius: 8px;
      border: 1px solid #E2E8F0;
      font-size: 14px;
      color: #334155;
      text-align: center;
    }
    .status-bar.check { border-color: #F43F5E; color: #E11D48; }
    .status-bar.gameover { border-color: #4F46E5; color: #4F46E5; font-weight: 600; }

    .error-msg {
      color: #E11D48;
      font-size: 13px;
      margin-top: 8px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="cb-app-card">
    <div class="cb-app-header">
      <span class="cb-app-icon">♞</span>
      <span class="cb-app-name">Chess</span>
      <span class="cb-app-status" id="header-status">White to move</span>
    </div>
    <div class="cb-app-body">
      <div class="board-container">
        <div class="board" id="board"></div>
      </div>
      <div class="status-bar" id="status">White to move</div>
      <div class="error-msg" id="error"></div>
    </div>
  </div>

  <script type="module" src="/src/chess-app.ts"></script>
</body>
</html>
