<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatBridge Spotify</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #191414;
      color: #FFFFFF;
      min-height: 100%;
      padding: 16px;
    }
    .spotify-card {
      max-width: 480px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .spotify-logo { font-size: 32px; }
    .playlist-name { font-size: 20px; font-weight: 700; }
    .playlist-desc { font-size: 13px; color: #B3B3B3; margin-top: 2px; }
    .track-list { list-style: none; }
    .track {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .track-num { width: 24px; text-align: right; color: #B3B3B3; font-size: 14px; }
    .track-info { flex: 1; }
    .track-name { font-size: 15px; font-weight: 500; }
    .track-artist { font-size: 13px; color: #B3B3B3; }
    .track-duration { color: #B3B3B3; font-size: 13px; }
    .open-spotify {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 24px;
      background: #1DB954;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .open-spotify:hover { background: #1ED760; }
    .auth-prompt {
      text-align: center;
      padding: 40px 20px;
    }
    .auth-prompt p { margin-bottom: 16px; color: #B3B3B3; }
    .connect-btn {
      padding: 12px 32px;
      background: #1DB954;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .loading { text-align: center; padding: 40px; color: #B3B3B3; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">🎵 Loading Spotify...</div>
  </div>
  <script type="module" src="/src/spotify-app.ts"></script>
</body>
</html>
